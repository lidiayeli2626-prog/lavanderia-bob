name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static files
        run: bun run build
        continue-on-error: true

      - name: Fallback to dist folder
        run: |
          if [ ! -d ".output/public" ]; then
            mkdir -p .output/public
            if [ -d "dist" ]; then
              cp -r dist/* .output/public/
            elif [ -d "build" ]; then
              cp -r build/* .output/public/
            else
              cp src/index.html .output/public/index.html || echo "No index found"
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
