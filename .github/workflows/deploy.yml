name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static files
        run: bun run build

      - name: Prepare production artifact
        run: |
          mkdir -p target_dir
          if [ -d ".output/public" ]; then
            cp -r .output/public/* target_dir/
          elif [ -d "dist" ]; then
            cp -r dist/* target_dir/
          elif [ -d "build" ]; then
            cp -r build/* target_dir/
          else
            cp src/index.html target_dir/index.html || cp index.html target_dir/index.html
          fi
          cp target_dir/index.html target_dir/404.html || echo "No index to duplicate"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target_dir

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
